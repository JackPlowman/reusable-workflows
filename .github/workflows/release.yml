name: Create Release

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/common-*.yml"
      - ".github/workflows/codeql-analysis.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create releases

    steps:
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Generate release tag
        id: generate_release_tag
        uses: amitsingh-007/next-release-tag@f0ea640ef142d04e2f91e1df087f6782585548af # v6.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: "v"
          tag_template: "yyyy.mm.dd.i"
      - name: Create Release with GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_RELEASE_TAG: ${{ steps.generate_release_tag.outputs.next_release_tag }}
        run: gh release create "$NEXT_RELEASE_TAG" --title "Release $NEXT_RELEASE_TAG" --generate-notes
