name: "CodeQL Analysis"

on:
  workflow_call:
    inputs:
      language:
        required: true
        description: "Language to analyse"
        type: string

# zizmor: ignore[concurrency-limits] only GitHub can trigger this workflow

permissions:
  contents: read

jobs:
  codeql-analysis:
    name: Analyse code
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Allow the workflow to upload analysis results
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ inputs.language }}
          queries: security-and-quality
          config-file: GitHubSecurityLab/CodeQL-Community-Packs/configs/default.yml@v0.5.1
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
