name: "CodeQL Analysis"

on:
  workflow_call:
    inputs:
      language:
        required: true
        description: "Language to analyse"
        type: string

# zizmor: ignore[concurrency-limits] only GitHub can trigger this workflow

permissions:
  contents: read

jobs:
  codeql-analysis:
    name: Analyse code
    runs-on: ubuntu-latest
    permissions:
      security-events: write # Allow the workflow to upload analysis results
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: ${{ inputs.language }}
          queries: security-and-quality
          config-file: GitHubSecurityLab/CodeQL-Community-Packs/configs/default.yml@v0.5.1
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
